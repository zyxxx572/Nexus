<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Nexus</title>
</head>
<body>

    <div id="app">
        <section id="calendar-page">
            <h1>行事曆</h1>
            <p>這裡是未來放月曆跟輸入事項的地方</p>
        </section>

        <section id="weekly-page" style="display: none;">
            <h1>當週事項</h1>
            <p>這裡是顯示一週計畫的地方</p>
        </section>
    </div>

    <nav id="bottom-nav">
        <button onclick="showPage('calendar')">行事曆</button>
        <button onclick="showPage('weekly')">當週事項</button>
    </nav>

</body>
</html>



<script>
        function showPage(pageName) {
            // 第一步：不管三七二十一，先把兩個分頁都先隱藏起來
            document.getElementById('calendar-page').style.display = 'none';
            document.getElementById('weekly-page').style.display = 'none';

            // 第二步：看按鈕傳了什麼名字進來，就把那個分頁打開
            if (pageName === 'calendar') {
                document.getElementById('calendar-page').style.display = 'block';
            } else if (pageName === 'weekly') {
                document.getElementById('weekly-page').style.display = 'block';
            }
        }
    </script>
